<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Tic Tac Toe</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            font-family: Arial, sans-serif;
        }
        .main{
            display: grid;
            height: 420px;
            width: 420px;
            border: 5px solid #fff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(3,1fr);
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            animation: fadeIn 1.5s ease-in-out;
        }
        .box{
            border: 2px solid rgba(255,255,255,0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: 900;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box:hover{
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box" data-index="0"></div>
        <div class="box" data-index="1"></div>
        <div class="box" data-index="2"></div>
        <div class="box" data-index="3"></div>
        <div class="box" data-index="4"></div>
        <div class="box" data-index="5"></div>
        <div class="box" data-index="6"></div>
        <div class="box" data-index="7"></div>
        <div class="box" data-index="8"></div>
    </div>
    <script src="index.js"></script>
</body>
</html>
